name: CI
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # ── 1. Secret scanning ───────────────────────────────────────────────
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        if: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ── 2. Dependency + IaC + container vuln scan ────────────────────────
      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy.sarif'
          exit-code: 1
      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy.sarif'
      # ── 3. SAST + quality gate ───────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,dist/**,.next/**,build/**
  codeql:
    name: CodeQL (Deep SAST)
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [javascript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
  Deploy-Production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: codeql
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.vercel_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "vercel_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
      - name: Create Deployment Summary
        run: |
          echo "## Production Deployment 🚀" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status:** Live" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL:** [${{ steps.deploy.outputs.vercel_url }}](${{ steps.deploy.outputs.vercel_url }})" >> $GITHUB_STEP_SUMMARY

  Deploy-Preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: codeql
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.vercel_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "vercel_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
      # - name: Comment Preview URL on PR
      #   uses: actions/github-script@v7
      #   with:
      #     script: |
      #       github.rest.issues.createComment({
      #         issue_number: context.issue.number,
      #         owner: context.repo.owner,
      #         repo: context.repo.repo,
      #         body: `## Preview Deployment 🔍\n✅ **Status:** Live\n🔗 **URL:** ${{ steps.deploy.outputs.vercel_url }}`
      #       })
      - name: Create Deployment Summary
        run: |
          echo "## Preview Deployment 🔍" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status:** Live" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL:** [${{ steps.deploy.outputs.vercel_url }}](${{ steps.deploy.outputs.vercel_url }})" >> $GITHUB_STEP_SUMMARY
